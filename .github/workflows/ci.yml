name: continuous-integration

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Ubuntu
            build_jobs: 4
          - os: macos-latest
            name: macOS
            build_jobs: 2
          - os: windows-latest
            name: Windows
            build_jobs: 4
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system build dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git \
            libblas-dev liblapack-dev pkg-config swig

      - name: Install system build dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install swig

      - name: Set up MSVC environment (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Python runtime dependencies
        run: pip install -r dependencies/requirements.txt

      - name: Build and install OpenSim from source
        working-directory: dependencies
        env:
          OPENSIM_BUILD_JOBS: ${{ matrix.build_jobs }}
        run: |
          python -c "import sys, yaml; yaml.safe_dump({'python_root_dir': sys.prefix}, open('config.yaml','w'))"
          python install_opensim.py

      - name: Install osimfit with test extras
        run: pip install -e ".[test]"

      - name: Run tests
        run: |
          export LD_LIBRARY_PATH=/home/runner/work/opensim-fitter/opensim-fitter/dependencies/opensim/opensim_core_install/sdk/Simbody/lib:$LD_LIBRARY_PATH
          pytest tests/ -v
